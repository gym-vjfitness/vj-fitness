<div class="fixed inset-x-0 top-4 sm:top-6 z-[9999] flex flex-col items-center gap-3 px-4 pointer-events-none">
      
      @for (toast of toastService.toasts(); track toast.id) {
        <div 
          class="toast-enter pointer-events-auto flex w-full max-w-md items-center gap-3 p-3 sm:p-4 rounded-2xl shadow-xl border border-border bg-surface/95 backdrop-blur-sm text-foreground transition-all"
          role="alert"
        >
          <div class="flex items-center justify-center shrink-0 w-8 h-8 rounded-full bg-background border border-border" [ngClass]="getIconColor(toast.type)">
            @switch (toast.type) {
              @case ('success') {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
              }
              @case ('warning') {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
              }
              @case ('error') {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
              }
              @case ('danger') {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              }
              @default {
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              }
            }
          </div>

          <p class="flex-1 text-sm font-medium tracking-tight">{{ toast.message }}</p>

          <button 
            (click)="toastService.remove(toast.id)" 
            class="shrink-0 p-1.5 rounded-full text-muted hover:text-foreground hover:bg-border transition-colors outline-none focus-visible:ring-2 focus-visible:ring-ring"
            aria-label="Close"
          >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
      }

    </div>

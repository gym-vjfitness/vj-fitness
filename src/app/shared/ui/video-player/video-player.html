<div class="fixed inset-0 z-[1000] flex items-center justify-center backdrop-blur-xs p-2 md:p-8 animate-in fade-in duration-300 select-none">
  
  <div class="relative w-full max-w-4xl !bg-transparent rounded-4xl backdrop-blur-2xl overflow-hidden border border-primary/40 flex flex-col shadow-[0_0_20px_rgb(from_var(--color-primary)_r_g_b_/_0.40)] ">
    
    <div class="flex items-center justify-between  px-6 py-3 z-50">
      <div class="flex items-center gap-3">
        <div class="w-2.5 h-2.5 rounded-full bg-primary animate-pulse shadow-[0_0_10px_var(--color-primary)]"></div>
        <span class="text-primary font-black text-sm md:text-base tracking-widest uppercase drop-shadow-md">{{ gymName() }}</span>
      </div>

      <button (click)="onClose()" 
              class="flex items-center justify-center p-1 rounded-full bg-danger/5 text-danger/50 hover:bg-danger/10 hover:text-danger/80 hover:scale-105 active:scale-90 transition-all duration-200 cursor-pointer border border-danger/20">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <div class="relative w-full aspect-video bg-foreground/90 backdrop-blur-3xl mx-auto overflow-hidden">
      <div class="absolute top-1/2 left-1/2 w-[160%] h-[160%] -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-0 transition-opacity duration-700"
           [class.opacity-100]="!isLoading()">
        <div #playerContainer class="w-full h-full pointer-events-none bg-transparent transition-all duration-300"></div>
      </div>

      <div class="absolute inset-0 z-20 cursor-pointer" (click)="togglePlay($event)"></div>

      @if (isLoading()) {
        <div class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-transparent pointer-events-none">
          <div class="w-12 h-12 border-4 border-foreground/10 border-t-primary rounded-full animate-spin"></div>
        </div>
      }

      <div class="absolute inset-0 z-30 flex items-center justify-center pointer-events-none transition-all duration-200"
           [class.opacity-0]="isPlaying() || isLoading()"
           [class.scale-110]="!isPlaying()">
        <div class="w-16 h-16 rounded-full text-white flex items-center justify-center backdrop-blur-md border border-foreground/20 shadow-xl">
          <svg class="w-8 h-8 ml-1 fill-current drop-shadow-lg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div class="px-6 py-2 bg-background/90 backdrop-blur-2xl flex flex-col gap-1 z-50">
      
      <div class="relative w-full flex items-center slider-container group/slider">
        <input 
          type="range" 
          min="0" 
          [max]="duration() || 100" 
          [value]="progress()" 
          [style.--progress]="progressPercentage"
          (mousedown)="onDragStart($event)"
          (touchstart)="onDragStart($event)"
          (input)="onDrag($event)"
          (change)="onDragEnd($event)"
          (touchend)="onDragEnd($event)"
          class="custom-slider z-10 w-full cursor-pointer">
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center gap-6">
          
          <button (click)="togglePlay($event)" class="text-primary hover:text-primary active:scale-90 transition-all duration-100 cursor-pointer">
            @if (isPlaying()) {
              <svg class="w-7 h-7 fill-current drop-shadow-md" viewBox="0 0 24 24"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
            } @else {
              <svg class="w-7 h-7 fill-current drop-shadow-md" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            }
          </button>

          <button (click)="toggleMute($event)" class="text-foreground hover:text-primary active:scale-90 transition-all duration-100 cursor-pointer">
            @if (isMuted()) {
              <svg class="w-6 h-6 fill-current drop-shadow-md" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            } @else {
              <svg class="w-6 h-6 fill-current drop-shadow-md" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            }
          </button>

          <div class="text-foreground/90 font-medium text-sm tabular-nums tracking-wide drop-shadow-md">
            {{ formatTime(progress()) }} <span class="text-foreground/50 mx-1">/</span> {{ formatTime(duration()) }}
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

@if (dialogService.isOpen()) {
  <div class="fixed inset-0 z-[100] bg-foreground/30 backdrop-blur-md transition-opacity dialog-backdrop"
       [class.dialog-closing]="isClosing()"></div>

  <div class="fixed inset-0 z-[101] flex flex-col justify-end md:justify-center items-center pointer-events-none p-0 md:p-6"
       [class.dialog-closing]="isClosing()">

    <div class="w-full md:max-w-md bg-surface pointer-events-auto
                rounded-t-[2rem] md:rounded-2xl shadow-2xl overflow-hidden
                border-t md:border border-border flex flex-col
                dialog-panel relative">
        
      <div class="w-full flex justify-center pt-4 pb-2 md:hidden">
         <div class="w-12 h-1.5 bg-muted/30 rounded-full"></div>
      </div>

      <div class="px-6 pb-8 pt-2 md:pt-8 md:px-8">
        
        <div class="flex flex-col items-center text-center gap-5">
           
           <div class="relative flex items-center justify-center p-5 rounded-full"
                [ngClass]="{
                  'bg-danger/10 text-danger': dialogService.config()?.mode === 'delete',
                  'bg-warning/10 text-warning': dialogService.config()?.mode === 'warning',
                  'bg-primary/10 text-primary': dialogService.config()?.mode !== 'delete' && dialogService.config()?.mode !== 'warning'
                }">
              
              <div class="absolute inset-0 blur-xl opacity-40 rounded-full"
                   [ngClass]="{
                     'bg-danger': dialogService.config()?.mode === 'delete',
                     'bg-warning': dialogService.config()?.mode === 'warning',
                     'bg-primary': dialogService.config()?.mode !== 'delete' && dialogService.config()?.mode !== 'warning'
                   }"></div>
              
              @if (dialogService.config()?.mode === 'delete') {
                <svg class="w-8 h-8 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
              } @else if (dialogService.config()?.mode === 'warning') {
                <svg class="w-8 h-8 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
              } @else {
                <svg class="w-8 h-8 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              }
           </div>

           <div>
             <h2 class="text-2xl font-black tracking-tight text-foreground uppercase">
               {{ dialogService.config()?.title }}
             </h2>
             <p class="mt-3 text-base text-muted leading-relaxed font-medium">
               {{ dialogService.config()?.message }}
             </p>
           </div>
        </div>

        <div class="mt-8 flex flex-col md:flex-row gap-3">
          <button class="flex-1 px-6 py-4 rounded-xl font-bold uppercase tracking-wider text-sm transition-all
                         bg-surface border-2 border-border text-foreground hover:bg-muted/10
                         focus:outline-none focus:ring-4 focus:ring-ring/20 order-2 md:order-1"
                  (click)="handleAction(false)">
            {{ dialogService.config()?.cancelText }}
          </button>
          
          <button class="flex-1 px-6 py-4 rounded-xl font-bold uppercase tracking-wider text-sm transition-all shadow-lg
                         focus:outline-none focus:ring-4 focus:ring-offset-2 focus:ring-offset-surface order-1 md:order-2"
                  [ngClass]="{
                    'bg-danger text-white hover:bg-danger/90 shadow-danger/20 focus:ring-danger/40': dialogService.config()?.mode === 'delete',
                    'bg-warning text-warning-fg hover:bg-warning/90 shadow-warning/20 focus:ring-warning/40': dialogService.config()?.mode === 'warning',
                    'bg-primary text-primary-fg hover:bg-primary/90 shadow-primary/20 focus:ring-primary/40': dialogService.config()?.mode !== 'delete' && dialogService.config()?.mode !== 'warning'
                  }"
                  (click)="handleAction(true)">
            {{ dialogService.config()?.confirmText }}
          </button>
        </div>
        
      </div>
    </div>
  </div>
}

<!-- Locked container: 100dvh height, hidden overflow to completely prevent scrolling -->
<main class="h-[100dvh] w-full overflow-hidden flex flex-col items-center justify-center bg-surface px-4 ">
  
  <!-- Centered content block, shifted slightly up for optical balance -->
  <div class="w-full max-w-xl flex flex-col items-center text-center -mt-8 sm:-mt-10">

    <!-- 1. The Badge (Moved into standard flow with mb-6 for guaranteed spacing) -->
    <div class="px-4 py-1.5 bg-danger/10 border border-danger/30 rounded-full mb-6">
      <span class="text-[0.65rem] sm:text-xs font-bold text-danger uppercase tracking-[0.2em] animate-pulse-fast">
        Critical Overload
      </span>
    </div>

    <!-- 2. The Exertion Meter (Scaled for mobile safety) -->
    <div class="relative w-40 h-20 sm:w-56 sm:h-28 mb-0 flex justify-center">
      <svg viewBox="0 0 100 50" class="w-full h-full overflow-visible drop-shadow-sm">
        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="currentColor" stroke-width="3" class="text-surface" stroke-linecap="round"/>
        <!-- Erratically filling danger track -->
        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="currentColor" stroke-width="4" class="text-danger animate-meter-erratic filter drop-shadow-[0_0_6px_var(--danger)]" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126" />
        <!-- Snapping Needle -->
        <line x1="50" y1="50" x2="15" y2="35" stroke="currentColor" stroke-width="3" class="text-foreground animate-needle-erratic" stroke-linecap="round" style="transform-origin: 50px 50px;" />
        <!-- Center Pivot -->
        <circle cx="50" cy="50" r="4" class="fill-background stroke-foreground" stroke-width="2" />
      </svg>
    </div>

    <!-- 3. The Animated Danger 404 (Font size scaled to fit mobile screens perfectly) -->
    <div class="relative mb-2">
      <h1 class="text-[6rem] sm:text-[8rem] md:text-[9rem] font-black leading-none tracking-tighter text-danger animate-muscle-tremor filter drop-shadow-[0_10px_30px_rgba(239,68,68,0.2)] select-none">
        404
      </h1>
      <h1 class="absolute inset-0 text-[6rem] sm:text-[8rem] md:text-[9rem] font-black leading-none tracking-tighter text-danger opacity-0 animate-energy-burst pointer-events-none">
        404
      </h1>
    </div>

    <!-- 4. Typography (Kept tight to the animation) -->
    <div class="space-y-2 mb-6 sm:mb-8">
      <h2 class="text-2xl sm:text-4xl md:text-5xl font-extrabold text-foreground tracking-tight">
        Lifting Failure.
      </h2>
      <p class="text-sm sm:text-base text-muted max-w-[18rem] sm:max-w-md mx-auto leading-relaxed">
        The load was too heavy. The page you attempted to lift has been dropped or never existed. 
      </p>
    </div>

    <!-- 5. Modern Buttons (Tight stacking on mobile, side-by-side on desktop) -->
    <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
      
      <a routerLink="/auth/login" class="group flex items-center justify-center gap-2 px-6 py-3.5 w-full sm:w-auto bg-foreground text-background rounded-2xl font-bold text-xs sm:text-sm uppercase tracking-widest transition-all duration-300 hover:bg-danger hover:text-white hover:-translate-y-1 hover:shadow-[0_10px_20px_-5px_var(--danger)] focus:outline-none focus:ring-4 focus:ring-danger/50">
        Deload & Return
        <svg class="w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-300 group-hover:translate-x-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </a>

      <button onclick="window.history.back()" class="group flex items-center justify-center gap-2 px-6 py-3.5 w-full sm:w-auto bg-transparent text-foreground border-2 border-border rounded-2xl font-bold text-xs sm:text-sm uppercase tracking-widest transition-all duration-300 hover:bg-surface hover:border-secondary focus:outline-none focus:ring-4 focus:ring-border active:scale-95">
        <svg class="w-4 h-4 sm:w-5 sm:h-5 transition-transform duration-300 group-hover:-translate-x-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"></path>
          <path d="m12 19-7-7 7-7"></path>
        </svg>
        Spot Me (Back)
      </button>

    </div>
  </div>
</main>

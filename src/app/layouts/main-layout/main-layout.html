<div class="flex h-[100dvh] w-full bg-background text-foreground overflow-hidden font-sans relative">

  <aside
    class="hidden md:flex flex-col w-[280px] m-4 h-[calc(100dvh-2rem)] rounded-[2rem] bg-surface/60 backdrop-blur-2xl border border-border/50 z-20 shadow-[0_8px_32px_rgba(0,0,0,0.05)] transition-all">

    <div class="p-8 pb-6 flex items-center gap-4">
      <div class="relative h-12 w-12 bg-surface rounded-full flex items-center justify-center border-2 border-primary/20 shadow-[0_0_20px_var(--color-primary)_inset] overflow-hidden pointer-events-none">
        
        <img class="relative z-10 w-full h-full object-cover" src="/assets/gym_logo.png" alt="GymPro Logo">
        
        <div class="absolute inset-0 w-[200%] bg-gradient-to-r from-transparent via-white/50 to-transparent animate-shimmer z-20"></div>
      </div>
      <div class="flex flex-col">
        <span class="text-2xl font-black tracking-tighter text-foreground uppercase">Gym<span class="text-primary">Pro</span></span>
        <span class="text-[10px] font-bold tracking-[0.2em] text-muted uppercase">System Active</span>
      </div>
    </div>

    <nav class="flex-1 relative px-4 overflow-y-auto no-scrollbar">
      <div class="relative z-10 flex flex-col gap-2">
        @for (item of currentNav(); track item.id) {
        
        <button (click)="setActive(item)"
          class="relative w-full h-14 flex items-center gap-4 px-5 rounded-2xl outline-none group overflow-hidden transition-colors duration-500 ease-[cubic-bezier(0.32,0.72,0,1)]"
          [class]="activeId() === item.id ? 'text-primary' : 'text-muted hover:text-foreground'">
          
          <div class="absolute inset-0 bg-primary/10 rounded-2xl transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] origin-left"
               [class]="activeId() === item.id ? 'opacity-100 scale-x-100' : 'opacity-0 scale-x-75'"></div>

          <div class="absolute left-0 top-1/4 bottom-1/4 w-1 bg-primary rounded-r-full shadow-[0_0_10px_var(--color-primary)] transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)]"
               [class]="activeId() === item.id ? 'opacity-100 translate-x-0' : 'opacity-0 -translate-x-full'"></div>

          <div [innerHTML]="item.icon" 
               class="relative z-10 w-6 h-6 shrink-0 flex items-center justify-center transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] [&>svg]:w-full [&>svg]:h-full"
               [class]="activeId() === item.id ? 'scale-110 drop-shadow-[0_0_8px_var(--color-primary)]' : 'group-hover:scale-110'"></div>
          
          <span class="relative z-10 text-sm font-bold tracking-wide">{{ item.label }}</span>
        </button>
        }
      </div>
    </nav>
    <div class="p-4 mt-auto">
      <button (click)="logout()" class="w-full py-4 bg-surface text-danger hover:bg-danger/10 transition-all rounded-2xl text-xs font-bold uppercase tracking-widest border border-border">
        Logout
      </button>
    </div>
  </aside>

  <main class="flex-1 relative flex flex-col h-full bg-background/50 overflow-hidden pb-[100px] md:pb-0">
    <div class="flex-1 w-full h-full overflow-y-auto relative no-scrollbar">
      <router-outlet></router-outlet>
    </div>
  </main>
  
  <div class="md:hidden fixed inset-0 z-50 flex flex-col justify-end transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)]"
       [class]="isMoreMenuOpen() ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'">
    
    <div class="absolute inset-0 bg-background/80 backdrop-blur-xs" (click)="closeMore()"></div>

    <div class="relative bg-surface/85 backdrop-blur-xs border-t border-border/40 rounded-t-[2.5rem] p-6 pb-[110px] shadow-[0_-10px_40px_rgba(0,0,0,0.15)] transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)]"
         [class]="isMoreMenuOpen() ? 'translate-y-0' : 'translate-y-full'">
      
      <div class="w-10 h-1 bg-border rounded-full mx-auto mb-8 opacity-60"></div>
      
      <div class="grid grid-cols-4 gap-y-8 gap-x-2">
        @for (item of secondaryNav(); track item.id) {
          <button (click)="setActive(item)" class="flex flex-col items-center justify-center gap-2.5 outline-none tap-highlight-transparent group">
            <div [innerHTML]="item.icon" class="w-[26px] h-[26px] text-foreground/80 group-active:text-primary group-active:scale-90 transition-all duration-200 [&>svg]:w-full [&>svg]:h-full drop-shadow-sm group-active:drop-shadow-[0_0_8px_var(--color-primary)]"></div>
            <span class="text-[10px] font-semibold tracking-wide text-foreground/80 group-active:text-primary transition-colors">{{ item.label }}</span>
          </button>
        }
        
        <button (click)="logout()" class="flex flex-col items-center justify-center gap-2.5 outline-none tap-highlight-transparent group">
          <div class="w-[26px] h-[26px] text-danger/80 group-active:text-danger group-active:scale-90 transition-all duration-200 drop-shadow-sm group-active:drop-shadow-[0_0_8px_var(--color-danger)]">
             <svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </div>
          <span class="text-[10px] font-semibold tracking-wide text-danger/80 group-active:text-danger transition-colors">Logout</span>
        </button>
      </div>
    </div>
  </div>

  <nav class="md:hidden fixed bottom-6 inset-x-4 z-50">
    <div class="relative w-full h-[68px] bg-surface/85 backdrop-blur-2xl border border-border/50 rounded-[2rem] shadow-[0_20px_40px_rgba(0,0,0,0.2)] flex items-center px-1">
      
      <div class="flex-1 flex justify-evenly items-center h-full">
        @for (item of primaryLeft(); track item.id) {
        <button (click)="setActive(item)" class="relative flex flex-col items-center justify-center w-full h-full outline-none tap-highlight-transparent group">
          <div [innerHTML]="item.icon" class="relative z-10 w-[22px] h-[22px] transition-all duration-300 flex items-center justify-center [&>svg]:w-full [&>svg]:h-full"
            [class]="activeId() === item.id && !isMoreMenuOpen() ? 'text-primary neon-glow -translate-y-1' : 'text-muted group-active:scale-90'"></div>
          <span class="absolute bottom-1.5 text-[9px] font-bold tracking-wider transition-all duration-300"
            [class]="activeId() === item.id && !isMoreMenuOpen() ? 'text-primary opacity-100 translate-y-0' : 'text-muted opacity-0 translate-y-2'">
            {{ item.label }}
          </span>
        </button>
        }
      </div>

      <div class="relative w-[76px] h-full flex-shrink-0 flex justify-center pointer-events-none">
        <div class="absolute -top-6 w-[72px] h-[72px] bg-background rounded-full p-1.5 shadow-[0_-8px_20px_rgba(0,0,0,0.05)] border-t border-border/30">
          <div class="relative w-full h-full bg-surface border border-primary/30 rounded-full flex items-center justify-center shadow-[0_0_20px_var(--color-primary)_inset,0_4px_10px_rgba(0,0,0,0.2)] overflow-hidden">
             <div class="absolute inset-0 bg-primary/10 blur-md z-0"></div>
             
             <img class="relative z-10 w-full h-full object-cover" src="/assets/gym_logo.png" alt="GymPro Logo">
             
             <div class="absolute inset-0 w-[200%] bg-gradient-to-r from-transparent via-white/50 to-transparent animate-shimmer z-20 pointer-events-none"></div>
          </div>
        </div>
      </div>

      <div class="flex-1 flex justify-evenly items-center h-full">
        @for (item of primaryRight(); track item.id) {
        <button (click)="setActive(item)" class="relative flex flex-col items-center justify-center w-full h-full outline-none tap-highlight-transparent group">
          <div [innerHTML]="item.icon" class="relative z-10 w-[22px] h-[22px] transition-all duration-300 flex items-center justify-center [&>svg]:w-full [&>svg]:h-full"
            [class]="activeId() === item.id && !isMoreMenuOpen() ? 'text-primary neon-glow -translate-y-1' : 'text-muted group-active:scale-90'"></div>
          <span class="absolute bottom-1.5 text-[9px] font-bold tracking-wider transition-all duration-300"
            [class]="activeId() === item.id && !isMoreMenuOpen() ? 'text-primary opacity-100 translate-y-0' : 'text-muted opacity-0 translate-y-2'">
            {{ item.label }}
          </span>
        </button>
        }

        <button (click)="toggleMore()" class="relative flex flex-col items-center justify-center w-full h-full outline-none tap-highlight-transparent group">
          <div [innerHTML]="moreIcon" 
               class="relative z-10 w-[22px] h-[22px] transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] flex items-center justify-center [&>svg]:w-full [&>svg]:h-full"
               [class]="isMoreMenuOpen() ? 'text-primary neon-glow -translate-y-1 rotate-[135deg] scale-110' : 'text-muted group-active:scale-90 rotate-0'"></div>
          <span class="absolute bottom-1.5 text-[9px] font-bold tracking-wider transition-all duration-300"
                [class]="isMoreMenuOpen() ? 'text-primary opacity-100 translate-y-0' : 'text-muted opacity-0 translate-y-2'">
            MORE
          </span>
        </button>
      </div>
      
    </div>
  </nav>

</div>

<app-announcement-dialog></app-announcement-dialog>
<app-user-deadline-dialog></app-user-deadline-dialog>

<!-- Ambient Premium Watermark Background (Page Level) -->
<div class="fixed inset-0 pointer-events-none z-0 flex items-center justify-center overflow-hidden bg-background">
  <div class="absolute inset-0 opacity-[0.02]"
    style="background-image: radial-gradient(var(--foreground) 1px, transparent 1px); background-size: 32px 32px;">
  </div>

  <svg class="absolute w-[150%] h-[150%] sm:w-[80%] sm:h-[80%] text-foreground opacity-[0.02] rotate-[-15deg] scale-125"
    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="0.5">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
    </path>
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
  </svg>
</div>

<div class="relative z-10 h-full p-4 md:p-8 animate-fade-in font-sans ">
  <div class="max-w-5xl mx-auto flex flex-col gap-8 md:gap-10 pb-4">

    <!-- HEADER SECTION -->
    <header class="flex items-center gap-4 mt-2">
      <button (click)="goBack()"
        class="w-12 h-12 shrink-0 flex items-center justify-center rounded-2xl bg-surface/80 backdrop-blur-md border border-border/60 shadow-sm text-muted hover:text-foreground hover:bg-border/30 hover:-translate-x-1 transition-all">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      <div>
        <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-foreground leading-none">Settings</h1>
        <p class="text-[10px] sm:text-xs font-bold text-muted uppercase tracking-widest mt-1.5">Gym Configuration</p>
      </div>
    </header>

    <!-- NAVIGATION LIST -->
    <!-- Uses a 1-column layout on mobile (vertical stack) and 2-column on desktop -->
    <main class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 relative z-20">

      <button (click)="userSettingService.toggleTheme()"
        class="group relative flex flex-row items-center gap-5 sm:gap-6 p-5 sm:p-6 rounded-[2rem] border bg-surface/90 backdrop-blur-2xl overflow-hidden cursor-pointer text-left transition-all duration-300 hover:shadow-xl hover:-translate-y-1 focus:outline-none focus:scale-95 border-border/50 shadow-md">
        
        <div class="absolute inset-0 blur-3xl opacity-10 pointer-events-none transition-opacity duration-500 group-hover:opacity-20 bg-info"></div>
        
        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1.5 h-1/2 rounded-r-full transition-all duration-300 ease-out group-hover:h-2/3 bg-info shadow-[0_0_8px_var(--info)]"></div>
        
        <div class="w-12 h-12 sm:w-14 sm:h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all duration-300 relative z-10 text-background shadow-lg scale-110 group-hover:scale-125 bg-info shadow-info/30">
          <svg class="w-6 h-6 sm:w-7 sm:h-7 transition-transform duration-500 group-hover:rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            @if (!userSettingService.isDarkMode()) {
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            }
          </svg>
        </div>

        <div class="flex flex-col relative z-10 w-full min-w-0 pr-2">
          <span class="text-sm sm:text-base font-black tracking-widest text-foreground transition-all duration-300 truncate">
            {{ userSettingService.isDarkMode() ?  'Dark Mode' : 'Light Mode' }}
          </span>
          <span class="text-[10px] sm:text-xs font-bold text-muted mt-0.5 truncate">
            Switch theme to {{ !userSettingService.isDarkMode() ?  'Dark Mode' : 'Light Mode' }}
          </span>
        </div>
      </button>

      @for(tab of settingTabs; track tab.id) {

      <!-- Tab Card (Styled exactly like the old "Active" state) -->
      <button (click)="navigateTo(tab.path)"
        class="group relative flex flex-row items-center gap-5 sm:gap-6 p-5 sm:p-6 rounded-[2rem] border bg-surface/90 backdrop-blur-2xl overflow-hidden cursor-pointer text-left transition-all duration-300 hover:shadow-xl hover:-translate-y-1 focus:outline-none focus:scale-95 border-border/50 shadow-md">

        <!-- INDIVIDUAL CARD WATERMARK -->
        <svg
          class="absolute -right-6 -bottom-6 w-32 h-32 opacity-[0.06] rotate-[-15deg] transition-transform duration-500 group-hover:scale-110 group-hover:rotate-0"
          [ngClass]="{
                 'text-success': tab.theme === 'success',
                 'text-info': tab.theme === 'info',
                 'text-primary': tab.theme === 'primary',
                 'text-warning': tab.theme === 'warning',
                 'text-danger': tab.theme === 'danger'
               }" fill="currentColor" viewBox="0 0 24 24">
          <path [attr.d]="tab.icon" />
        </svg>

        <!-- Ambient Glowing Orb inside the card -->
        <div
          class="absolute inset-0 blur-3xl opacity-10 pointer-events-none transition-opacity duration-500 group-hover:opacity-20"
          [ngClass]="{
                 'bg-success': tab.theme === 'success',
                 'bg-info': tab.theme === 'info',
                 'bg-primary': tab.theme === 'primary',
                 'bg-warning': tab.theme === 'warning',
                 'text-danger': tab.theme === 'danger'
               }"></div>

        <!-- Active Border Strip (Left Edge Indicator) -->
        <div
          class="absolute left-0 top-1/2 -translate-y-1/2 w-1.5 h-1/2 rounded-r-full transition-all duration-300 ease-out group-hover:h-2/3"
          [ngClass]="{
                 'bg-success shadow-[0_0_8px_var(--success)]': tab.theme === 'success',
                 'bg-info shadow-[0_0_8px_var(--info)]': tab.theme === 'info',
                 'bg-primary shadow-[0_0_8px_var(--primary)]': tab.theme === 'primary',
                 'bg-warning shadow-[0_0_8px_var(--warning)]': tab.theme === 'warning',
                 'bg-danger shadow-[0_0_8px_var(--danger)]': tab.theme === 'danger',
               }"></div>

        <!-- Solid Glowing Icon Block -->
        <div
          class="w-12 h-12 sm:w-14 sm:h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all duration-300 relative z-10 text-background shadow-lg scale-110 group-hover:scale-125"
          [ngClass]="{
                 'bg-success shadow-success/30': tab.theme === 'success',
                 'bg-info shadow-info/30': tab.theme === 'info',
                 'bg-primary shadow-primary/30': tab.theme === 'primary',
                 'bg-warning shadow-warning/30': tab.theme === 'warning',
                 'bg-danger shadow-danger/30': tab.theme === 'danger',
               }">
          <svg class="w-6 h-6 sm:w-7 sm:h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="tab.icon" />
          </svg>
        </div>

        <!-- Text Information -->
        <div class="flex flex-col relative z-10 w-full min-w-0 pr-2">
          <span
            class="text-sm sm:text-base font-black tracking-widest text-foreground transition-all duration-300 truncate">{{
            tab.label }}</span>
          <span class="text-[10px] sm:text-xs font-bold text-muted mt-0.5 truncate">{{ tab.description }}</span>
        </div>

      </button>
      }
    </main>

  </div>
</div>
